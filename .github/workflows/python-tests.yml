# .github/workflows/python-tests.yml
# CI workflow: run the Python reference test suite on push + PR.
# v0.1.1: 52 tests. v0.2.0+ adds the Lyapunov suite; v0.3.0 the Phase-3 full-spectrum
# suite (test_lyapunov_phase3.py) — the latter need scipy (libration/elliptic + Phase 3).
name: python-tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy scipy pytest
      - name: Run pytest (fast tests)
        run: python -m pytest tests/ -v -m "not slow"
      - name: Smoke-run first example
        run: python run_first_example.py
